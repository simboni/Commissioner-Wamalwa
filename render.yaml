# Render Blueprint — static site
# Serves the Commissioner Dr. Dennis Wamalwa website (plain HTML/CSS/JS, no build step).
# Docs: https://render.com/docs/blueprint-spec
services:
  - type: web
    name: commissioner-wamalwa
    runtime: static
    buildCommand: "echo 'No build step required — static site'"
    staticPublishPath: .
    pullRequestPreviewsEnabled: false
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
